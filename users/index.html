<script>
const params = new URLSearchParams(window.location.search);
//const mensagensMostradas = new Set();

const user = params.get("user");
const to = params.get("to");

if (!user || !to) {
alert("Link inválido");
throw new Error("sem user/to");
}

const protocolo = location.protocol === "https:" ? "wss:" : "ws:";
const ws = new WebSocket(`${protocolo}//chat-qr5y.onrender.com/?user=${user}&to=${to}`);

const chat = document.getElementById("chat");

const nomeUsuario = localStorage.getItem("user_nome") || user;
const fotoUsuario = localStorage.getItem("user_foto") || "https://via.placeholder.com/40";

const mensagensMostradas = new Set();

ws.onmessage = async (event) => {
  const data = JSON.parse(event.data);
  
  if (data.online !== undefined) return;
  if (data.erro) return alert(data.erro);
  
  if (mensagensMostradas.has(data.id)) return;
  
  mensagensMostradas.add(data.id);
  
  renderMensagem({
    user: data.user,
    nome: data.nome || data.user,
    mensagem: data.mensagem || data.texto,
    tipo: data.tipo || "texto",
    arquivo: data.arquivo,
    mime: data.mime,
    hora: data.hora
  });
};
function gerarId() {
  return Date.now() + "_" + Math.random().toString(36).slice(2);
}


function enviar() {
  const input = document.getElementById("msg");
  
  if (!input.value.trim()) return;
  
  const data = {
    id: gerarId(),
    tipo: "texto",
    mensagem: input.value,
    user: user,
    nome: nomeUsuario,
    foto: fotoUsuario,
    hora: Date.now()
  };
  
  mensagensMostradas.add(data.id);
  
  renderMensagem(data);
  enviarSeguro(data);
  
  input.value = "";
}

function enviarSeguro(data) {
  data.id = data.id || gerarId();
  data.to = to;
  
  if (ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  } else {
    alert("Sem conexão");
  }
}

async function renderMensagem(data) {
const isEu = data.user === user;

const nomeFinal = isEu ? nomeUsuario : (data.nome || data.user);
const fotoFinal = isEu ? fotoUsuario : (data.foto || "https://via.placeholder.com/40");

const msgBox = document.createElement("div");
msgBox.style.margin = "10px 0";

msgBox.innerHTML = `
<div style="display:flex; align-items:center; gap:5px;">
  <img src="${fotoFinal}" width="35" height="35" style="border-radius:100px;" />
  <div>
    <p style="color:#fff; margin:0; font-size:13px;">${nomeFinal}</p>
    <p style="color:#aaa; margin:0; font-size:10px;">
      ${formatarHora(data.hora)}
    </p>
  </div>
</div>
`;

const body = document.createElement("div");
body.style.marginLeft = "40px";
body.style.marginTop = "5px";
body.style.padding = "8px";
body.style.borderRadius = "10px";
body.style.maxWidth = "75%";
body.style.wordBreak = "break-word";
//body.style.background = isEu ? "#005c4b" : "#1f1f1f";
body.style.color = "#fff";

if (data.tipo === "texto") {
const linkRegex = /(https?:\/\/[^\s]+)/g;
const parts = data.mensagem.split(linkRegex);

for (const part of parts) {
if (part.match(linkRegex)) {
const a = document.createElement("a");
a.href = part;
a.textContent = part;
a.target = "_blank";
a.style.color = "#00DA60";
a.style.display = "block";
a.style.marginTop = "5px";
body.appendChild(a);

// preview
try {
const res = await fetch(`/preview?url=${encodeURIComponent(part)}`);
const prev = await res.json();

if (!prev.erro) {
const preview = document.createElement("div");
preview.style.marginTop = "6px";
preview.style.borderRadius = "10px";
preview.style.overflow = "hidden";
preview.style.background = "#2a2a2a";
preview.style.cursor = "pointer";

preview.onclick = () => window.open(part, "_blank");

if (prev.imagem) {
const img = document.createElement("img");
img.src = prev.imagem;
img.style.width = "100%";
preview.appendChild(img);
}

const info = document.createElement("div");
info.style.padding = "8px";

const titulo = document.createElement("p");
titulo.textContent = prev.titulo || "Sem título";
titulo.style.fontWeight = "bold";
titulo.style.margin = "0";

const desc = document.createElement("p");
desc.textContent = prev.descricao || "";
desc.style.fontSize = "12px";
desc.style.color = "#aaa";

info.appendChild(titulo);
info.appendChild(desc);

preview.appendChild(info);
body.appendChild(preview);
}
} catch {}
} else {
const span = document.createElement("span");
span.textContent = part;
span.style.whiteSpace = "pre-line";
body.appendChild(span);
}
}
}

if (data.tipo === "media" && data.mime?.startsWith("image/")) {
const img = document.createElement("img");
img.src = data.arquivo;
img.style.width = "100%";
img.style.borderRadius = "10px";
body.appendChild(img);
}

if (data.tipo === "media" && data.mime?.startsWith("video/")) {
const video = document.createElement("video");
video.src = data.arquivo;
video.controls = true;
video.style.width = "100%";
body.appendChild(video);
}

if (data.tipo === "sticker") {
const img = document.createElement("img");
img.src = data.arquivo;
img.style.width = "110px";
body.appendChild(img);
}

msgBox.appendChild(body);
chat.appendChild(msgBox);
chat.scrollTop = chat.scrollHeight;
}

function formatarHora(ts) {
return new Date(ts).toLocaleTimeString([], {
hour: "2-digit",
minute: "2-digit"
});
}
