         <script>
  const canvasB = document.getElementById("starCanvasB");
    const ctxe = canvasB.getContext("2d");

    canvasB.width = window.innerWidth;
    canvasB.height = window.innerHeight;

    const starss = [];
    const numStarse = 320;

    for (let i = 0; i < numStarse; i++) {
      starss.push({
        x: Math.random() * canvasB.width,
        y: Math.random() * canvasB.height,
        radius: Math.random() * 0.9,
        speed: Math.random() * 1.5 + 0.5
      });
    }

    function drawStarse() {
      ctxe.clearRect(0, 0, canvasB.width, canvasB.height);
      ctxe.fillStyle = "red";
      starss.forEach(stare => {
        ctxe.beginPath();
        ctxe.arc(stare.x, stare.y, stare.radius, 0, Math.PI * 2);
        ctxe.fill();
      });
    }

    function updateStarse() {
      starss.forEach(stare => {
        stare.y += stare.speed;
        if (stare.y > canvasB.height) {
          stare.y = -stare.radius;
          stare.x = Math.random() * canvasB.width;
        }
      });
    }

    function animatee() {
      drawStarse();
      updateStarse();
      requestAnimationFrame(animatee);
    }

    animatee();

    window.addEventListener('resize', () => {
      canvasB.width = window.innerWidth;
      canvasB.height = window.innerHeight;
    });

</script>

  const canvas = document.getElementById("starCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = [];
    const numStars = 3720;

    for (let i = 0; i < numStars; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 0.9,
        speed: Math.random() * 1.5 + 0.5,
        speedY: -5 - Math.random() * 4,
        gravity: 0.70,
    fallingSpeed: 1 + Math.random() * 2,
    phase: "intro"

      });
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "orange";
      stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function updateStars() {
      stars.forEach(star => {
  //      star.y += star.speed;
        //if (star.y > canvas.height) {
    //      star.y = -star.radius;
      //    star.x = Math.random() * canvas.width;
       // }
       if (star.phase === "intro") {

      star.y += star.speedY;
      star.speedY += star.gravity;

      if (star.speedY >= 0) {
        star.phase = "falling";
      }

    } else {

      star.y += star.fallingSpeed;

      if (star.y > canvas.height) {
        star.y = 20;
        star.x = Math.random() * canvas.width;
      }
    }

      });
    }

    function animate() {
      drawStars();
      updateStars();
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

function formatarHora(timestamp) {
  const d = new Date(timestamp);
  
  const dia = String(d.getDate()).padStart(2, "0");
  const mes = String(d.getMonth() + 1).padStart(2, "0");
  const ano = d.getFullYear();
  
  const hora = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");
  
  return `${dia}/${mes}/${ano} • ${hora}:${min}`;
}

function formatTime(sec) {
  const min = String(Math.floor(sec / 60)).padStart(2, "0");
  const s = String(sec % 60).padStart(2, "0");
  return `${min}:${s}`;
}

/* -------- GRAVAR -------- */

startBtn.onclick = async () => {
 
  cancer.classList.toggle("ativo");
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  
  audioContext = new(window.AudioContext || window.webkitAudioContext)();
  source = audioContext.createMediaStreamSource(stream);
  destination = audioContext.createMediaStreamDestination();
  
  if (voiceMode === "demon") {
    const filter = audioContext.createBiquadFilter();
    filter.type = "lowshelf";
    filter.frequency.value = 500;
    filter.gain.value = 20;
    source.connect(filter);
    filter.connect(destination);
  }
  else if (voiceMode === "chipmunk") {
    const filter = audioContext.createBiquadFilter();
    filter.type = "highshelf";
    filter.frequency.value = 1000;
    filter.gain.value = 25;
    source.connect(filter);
    filter.connect(destination);
  }
  else {
    source.connect(destination);
  }
  
  mediaRecorder = new MediaRecorder(destination.stream);
  audioChunks = [];
  seconds = 0;
  
  statusDiv = document.createElement("div");
  statusDiv.className = "recorder-box";
  statusDiv.innerHTML = `
    <img src="./EAF1306E-B9DC-4B71-84CF-AF87B84D6CD4.gif" class="gggggggg" width="50" height="50"/>
    <div class="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <span id="timer">00:00</span>
  `;
  
  //document.body.appendChild(statusDiv);
 startBtn.style.display = "none";
 stopBtn.style.display = "block";
  carga.appendChild(statusDiv);

  
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById("timer").textContent = formatTime(seconds);
  }, 1000);
  
  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };
  
  //function cak(){
   
 // }
  
  
mediaRecorder.onstop = async () => {
  if (wasCanceled) {
  wasCanceled = false; // reseta pra próxima gravação
  return; // 🚫 impede de criar o áudio
}

  
  clearInterval(timerInterval);
  
  if (audioChunks.length === 0) return;
  
  const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
  const arrayBuffer = await blob.arrayBuffer();
  
  const audioContext = new(window.AudioContext || window.webkitAudioContext)();
  const decodedBuffer = await audioContext.decodeAudioData(arrayBuffer);
  
  let pitchFactor = 1;
  
  if (voiceMode === "demon") {
    pitchFactor = 0.45; // EXTREMAMENTE grave
  }
  else if (voiceMode === "chipmunk") {
    pitchFactor = 1.8;
  }
  
  const offlineCtx = new OfflineAudioContext(
    decodedBuffer.numberOfChannels,
    decodedBuffer.length,
    decodedBuffer.sampleRate
  );
  
  const source = offlineCtx.createBufferSource();
  source.buffer = decodedBuffer;
  source.playbackRate.value = pitchFactor;
  
  let lastNode = source;
  
 if (voiceMode === "demon") {
  
  // 🔻 pitch moderado (não exagerado)
  pitchFactor = 0.75;
  
  const lowFilter = offlineCtx.createBiquadFilter();
  lowFilter.type = "lowshelf";
  lowFilter.frequency.value = 250;
  lowFilter.gain.value = 6; // leve reforço
  
  source.connect(lowFilter);
  lastNode = lowFilter;
}

  lastNode.connect(offlineCtx.destination);
  source.start();
  
  const renderedBuffer = await offlineCtx.startRendering();
  
  const finalBlob = bufferToWave(renderedBuffer, renderedBuffer.length);
  const url = URL.createObjectURL(finalBlob);
  
  statusDiv.innerHTML = "";

/* -------- PARAR -------- */

stopBtn.onclick = () => {
  cancer.classList.toggle("ativo");
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
  
  clearInterval(timerInterval);
  stream.getTracks().forEach(track => track.stop());
  audioContext.close();
  
  startBtn.disabled = false;
  stopBtn.disabled = true;
  stopBtn.style.display = "none";
  cancelBtn.disabled = true;
  startBtn.style.display = "block";

};

/* -------- CANCELAR -------- */

cancelBtn.onclick = () => {
  wasCanceled = true; 
  cancer.classList.toggle("ativo");

  startBtn.style.display = "block";

  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
  
  clearInterval(timerInterval);
  audioChunks = [];
  stream.getTracks().forEach(track => track.stop());
  audioContext.close();

  
  if (statusDiv) statusDiv.remove();
  
  startBtn.disabled = false;
  stopBtn.disabled = true;
  stopBtn.style.display = "none";
  cancelBtn.disabled = true;

};

function bufferToWave(abuffer, len) {
  const numOfChan = abuffer.numberOfChannels;
  const length = len * numOfChan * 2 + 44;
  const buffer = new ArrayBuffer(length);
  const view = new DataView(buffer);
  let offset = 0;
  let pos = 0;
  
  function setUint16(data) {
    view.setUint16(pos, data, true);
    pos += 2;
  }
  
  function setUint32(data) {
    view.setUint32(pos, data, true);
    pos += 4;
  }
  
  setUint32(0x46464952);
  setUint32(length - 8);
  setUint32(0x45564157);
  
  setUint32(0x20746d66);
  setUint32(16);
  setUint16(1);
  setUint16(numOfChan);
  setUint32(abuffer.sampleRate);
  setUint32(abuffer.sampleRate * 2 * numOfChan);
  setUint16(numOfChan * 2);
  setUint16(16);
  
  setUint32(0x61746164);
  setUint32(length - pos - 4);
  
  for (let i = 0; i < abuffer.numberOfChannels; i++)
    offset = 0;
  
  while (pos < length) {
    for (let i = 0; i < numOfChan; i++) {
      const sample = abuffer.getChannelData(i)[offset];
      const s = Math.max(-1, Math.min(1, sample));
      view.setInt16(pos, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      pos += 2;
    }
    offset++;
  }
  
  return new Blob([buffer], { type: "audio/wav" });
}
